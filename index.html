<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2fun - every hate u</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/nixitos/2fun.net/main/favicon.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/nixitos/2fun.net/main/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="https://raw.githubusercontent.com/nixitos/2fun.net/refs/heads/main/mascot.png" 
                 alt="2fun mascot" 
                 style="height: 50px; width: auto;">
            <h1 style="margin: 0;">2fun.net</h1>
            <a href="https://t.me/twofannet" target="_blank" rel="noopener noreferrer">
                <img src="https://static.vecteezy.com/system/resources/previews/065/386/696/non_2x/telegram-icon-white-logo-telegram-app-transparent-background-premium-social-media-design-for-digital-download-free-png.png" 
                     alt="Telegram" 
                     style="height: 30px; width: auto; margin-left: 10px; vertical-align: middle;">
            </a>
        </div>
        <div class="boards">
            <a href="?board=b">общий</a>
            <a href="?board=pol">политика</a>
            <a href="?board=tech">технологии</a>
        </div>
    </div>
        
    <div id="content"></div>
    
    <script>
        const API_BASE = 'https://twofun-net.onrender.com/api';
        let currentBoard = new URLSearchParams(location.search).get('board') || 'b';
        
        function loadThreads() {
            fetch(`${API_BASE}/boards/${currentBoard}/thread`)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.json();
                })
                .then(threads => {
                    // Сортируем: сначала новые
                    const sorted = [...threads].sort((a, b) => {
                        const dateA = new Date(a.bump_time || a.created_at);
                        const dateB = new Date(b.bump_time || b.created_at);
                        return dateB - dateA;
                    });
                    
                    const html = `
                        <div class="new-thread-form">
                            <h3>Создать тред</h3>
                            <input type="text" id="threadTitle" placeholder="Тема (необязательно)">
                            <textarea id="threadContent" placeholder="Текст поста" rows="3"></textarea>
                            <input type="text" id="threadName" placeholder="Имя (Аноним)">
                            <button onclick="createThread()">Создать</button>
                        </div>
                        <div class="threads">
                            ${sorted.length === 0 ? '<p>Тредов пока нет. Создай первый!</p>' : sorted.map(t => `
                                <div class="thread">
                                    <div class="thread-header">
                                        <span class="thread-title">${escapeHtml(t.title || 'Без темы')}</span>
                                        <span class="thread-replies">ответов: ${t.reply_count || 0}</span>
                                    </div>
                                    <div class="thread-op">
                                        <span class="op-name"><strong>${escapeHtml(t.op_name || 'Аноним')}</strong></span>
                                        <span class="op-date">${formatDate(t.created_at)}</span>
                                        <div class="op-content">${truncateText(t.op_content, 200)}</div>
                                    </div>
                                    <a href="thread.html?id=${t.id}" class="reply-link">Ответить</a>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    document.getElementById('content').innerHTML = html;
                })
                .catch(err => {
                    console.error('Ошибка загрузки:', err);
                    document.getElementById('content').innerHTML = '<p style="color: red;">Ошибка загрузки тредов. Попробуйте позже.</p>';
                });
        }
        
        function createThread() {
            const title = document.getElementById('threadTitle').value;
            const content = document.getElementById('threadContent').value;
            const guest_name = document.getElementById('threadName').value;
            
            if (!content.trim()) {
                alert('Введите текст поста');
                return;
            }
            
            const btn = document.querySelector('.new-thread-form button');
            btn.disabled = true;
            btn.textContent = 'Создаю...';
            
            fetch(`${API_BASE}/boards/${currentBoard}/thread`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, content, guest_name})
            })
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                if (data.thread_id) {
                    document.getElementById('threadTitle').value = '';
                    document.getElementById('threadContent').value = '';
                    document.getElementById('threadName').value = '';
                    loadThreads();
                } else {
                    alert('Ошибка: ' + (data.error || 'неизвестная'));
                }
            })
            .catch(err => {
                console.error('Ошибка создания:', err);
                alert('Не удалось создать тред: ' + err.message);
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Создать';
            });
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function truncateText(text, maxLength) {
            if (!text) return '';
            if (text.length <= maxLength) return escapeHtml(text);
            
            let truncated = text.substring(0, maxLength);
            const lastSpace = truncated.lastIndexOf(' ');
            if (lastSpace > 0) {
                truncated = truncated.substring(0, lastSpace);
            }
            return escapeHtml(truncated) + '<span class="truncation-dots">…</span>';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadThreads();
    </script>
</body>
</html>
