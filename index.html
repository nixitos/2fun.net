<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2fun - every hate u</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>2fun.net</h1>
        <div class="boards">
            <a href="?board=b">/b/</a>
            <a href="?board=pol">/pol/</a>
            <a href="?board=tech">/tech/</a>
        </div>
    </div>
    
    <div id="content"></div>
    
    <script>
        const API_BASE = 'https://twofun-net.onrender.com/api';
        let currentBoard = new URLSearchParams(location.search).get('board') || 'b';
        
        function loadThreads() {
            fetch(`${API_BASE}/boards/${currentBoard}/threads`)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.json();
                })
                .then(threads => {
                    const html = `
                        <div class="new-thread-form">
                            <h3>Создать тред</h3>
                            <input type="text" id="threadTitle" placeholder="Тема (необязательно)">
                            <textarea id="threadContent" placeholder="Текст поста" rows="3"></textarea>
                            <input type="text" id="threadName" placeholder="Имя (Аноним)">
                            <button onclick="createThread()">Создать</button>
                        </div>
                        <div class="threads">
                            ${threads.length === 0 ? '<p>Тредов пока нет. Создай первый!</p>' : threads.map(t => `
                                <div class="thread">
                                    <div class="thread-header">
                                        <span class="thread-title">${escapeHtml(t.title || 'Без темы')}</span>
                                        <span class="thread-replies">ответов: ${t.reply_count || 0}</span>
                                    </div>
                                    <div class="thread-op">${escapeHtml((t.op_content || '')).substring(0, 200)}</div>
                                    <button onclick="alert('Страница треда в разработке, ID: ${t.id}')">Ответить</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    document.getElementById('content').innerHTML = html;
                })
                .catch(err => {
                    console.error('Ошибка загрузки:', err);
                    document.getElementById('content').innerHTML = '<p style="color: red;">Ошибка загрузки тредов. Проверь консоль.</p>';
                });
        }
        
        function createThread() {
            const title = document.getElementById('threadTitle').value;
            const content = document.getElementById('threadContent').value;
            const guest_name = document.getElementById('threadName').value;
            
            if (!content.trim()) {
                alert('Введите текст поста');
                return;
            }
            
            fetch(`${API_BASE}/boards/${currentBoard}/thread`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, content, guest_name})
            })
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                if (data.thread_id) {
                    document.getElementById('threadTitle').value = '';
                    document.getElementById('threadContent').value = '';
                    document.getElementById('threadName').value = '';
                    loadThreads();
                } else {
                    alert('Ошибка: ' + (data.error || 'неизвестная'));
                }
            })
            .catch(err => {
                console.error('Ошибка создания:', err);
                alert('Не удалось создать тред: ' + err.message);
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadThreads();
    </script>
</body>
</html>
