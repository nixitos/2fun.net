<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2fun - тред</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/nixitos/2fun.net/main/favicon.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/nixitos/2fun.net/main/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
</head>
<body>
    <div class="header">
        <h1><a href="/2fun.net/?board=b" style="color: white; text-decoration: none;">2fun.net</a></h1>
    </div>
    
    <div id="content">
        <div class="loading" id="loading-text">Загрузка...</div>
    </div>
    
    <script>
        const API_BASE = 'https://twofun-net.onrender.com/api';
        const urlParams = new URLSearchParams(location.search);
        const threadId = urlParams.get('id');
        
        if (!threadId) {
            window.location.href = '/2fun.net/';
        }
        
        // Локализация
        const translations = {
            ru: {
                loading: "Загрузка...",
                thread_not_found: "Тред не найден",
                replies: "Ответы",
                reply_name_placeholder: "Имя (Аноним)",
                reply_content_placeholder: "Текст ответа",
                reply_button: "Ответить",
                sending: "Отправка...",
                empty_replies: "Пока нет ответов. Будь первым!",
                error_load: "Ошибка загрузки треда. Проверь консоль.",
                error_empty: "Введите текст ответа",
                error_send: "Не удалось отправить ответ: "
            },
            en: {
                loading: "Loading...",
                thread_not_found: "Thread not found",
                replies: "Replies",
                reply_name_placeholder: "Name (Anonymous)",
                reply_content_placeholder: "Reply text",
                reply_button: "Reply",
                sending: "Sending...",
                empty_replies: "No replies yet. Be the first!",
                error_load: "Failed to load thread. Check console.",
                error_empty: "Enter reply text",
                error_send: "Failed to send reply: "
            }
        };
        
        // Определяем язык по браузеру
        let currentLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
        // =================================
        
        let allPosts = [];
        
        function loadThread() {
            const t = translations[currentLang];
            document.getElementById('loading-text').textContent = t.loading;
            
            fetch(`${API_BASE}/thread/${threadId}/posts`)
                .then(r => r.json())
                .then(posts => {
                    if (!posts || posts.length === 0) {
                        document.getElementById('content').innerHTML = `<p>${t.thread_not_found}</p>`;
                        return;
                    }
                    
                    allPosts = posts;
                    const op = posts[0];
                    const replies = posts.slice(1);
                    const replyCount = replies.length;
                    
                    const defaultName = currentLang === 'ru' ? 'Аноним' : 'Anonymous';
                    
                    const html = `
                        <div class="thread-container">
                            <div class="op-post">
                                <div class="post-header">
                                    <span class="post-name">${escapeHtml(op.guest_name || defaultName)}</span>
                                    <span class="post-date">${formatDate(op.created_at)}</span>
                                </div>
                                <div class="post-content">${escapeHtml(op.content).replace(/\n/g, '<br>')}</div>
                            </div>
                            
                            <div class="replies">
                                <h3>${t.replies} (${replyCount})</h3>
                                
                                <div class="reply-form">
                                    <input type="text" id="replyName" placeholder="${t.reply_name_placeholder}" maxlength="30">
                                    <textarea id="replyContent" placeholder="${t.reply_content_placeholder}" rows="3"></textarea>
                                    <button onclick="createReply()">${t.reply_button}</button>
                                </div>
                                
                                <div class="reply-list">
                                    ${replyCount === 0 ? `<p class="empty-replies">${t.empty_replies}</p>` : 
                                        replies.map(post => `
                                            <div class="reply" id="post-${post.id}">
                                                <div class="post-header">
                                                    <span class="post-name"><strong>${escapeHtml(post.guest_name || defaultName)}</strong></span>
                                                    <span class="post-date">${formatDate(post.created_at)}</span>
                                                </div>
                                                <div class="post-content">${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
                                            </div>
                                        `).join('')
                                    }
                                </div>
                            </div>
                        </div>
                    `;
                    document.getElementById('content').innerHTML = html;
                    
                    if (location.hash && location.hash.startsWith('#post-')) {
                        const target = document.querySelector(location.hash);
                        if (target) target.scrollIntoView({ behavior: 'smooth' });
                    }
                })
                .catch(err => {
                    console.error('Ошибка:', err);
                    document.getElementById('content').innerHTML = `<p style="color: red;">${translations[currentLang].error_load}</p>`;
                });
        }
        
        function createReply() {
            const name = document.getElementById('replyName').value.trim();
            const content = document.getElementById('replyContent').value.trim();
            const t = translations[currentLang];
            
            if (!content) {
                alert(t.error_empty);
                return;
            }
            
            const btn = document.querySelector('.reply-form button');
            if (!btn) {
                console.error('Кнопка не найдена');
                return;
            }
            
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = t.sending;
            
            fetch(`${API_BASE}/thread/${threadId}/post`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    guest_name: name || (currentLang === 'ru' ? 'Аноним' : 'Anonymous'),
                    content: content
                })
            })
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(() => {
                document.getElementById('replyContent').value = '';
                loadThread();
            })
            .catch(err => {
                console.error('Ошибка:', err);
                alert(t.error_send + err.message);
                // Восстанавливаем кнопку только если она ещё существует
                const currentBtn = document.querySelector('.reply-form button');
                if (currentBtn) {
                    currentBtn.disabled = false;
                    currentBtn.textContent = t.reply_button;
                }
            });
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Инициализация
        loadThread();
    </script>
</body>
</html>
